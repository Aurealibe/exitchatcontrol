name: link-rot

# The guide's credibility rests on its primary sources staying reachable —
# and chronicle sites decay (EFF's own NSA archive stopped updating in 2016).
# Weekly HTTP check of every cited source; opens the log for triage.
# No ${{ github.event.* }} interpolation anywhere (injection-safe).
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-links.mjs
      - name: open triage issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        # only runner-provided variables — no event-payload interpolation
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "link-rot: a cited primary source is failing" \
            --body "The weekly link check found at least one broken citation. Run log: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — fix or swap the source (see docs/RESEARCH.md for the citation policy)."
